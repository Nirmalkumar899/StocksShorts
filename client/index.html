<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>StocksShorts - Indian Stock Market News</title>
    <meta name="build-version" content="v6.2-cache-clear" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Get real-time Indian stock market news in bite-sized format. Track Nifty 50, Bank Nifty, Sensex live updates, IPO analysis, breakout stocks, AI-powered stock analysis, and SEBI RIA advisory services. Free mobile app for instant market alerts." />
    <meta name="keywords" content="Indian stock market news, Nifty 50, Bank Nifty, Sensex, BSE, NSE, IPO, stock analysis, AI stock advisor, SEBI RIA, breakout stocks, market alerts, stock prices, investment advice" />
    <meta name="author" content="StocksShorts" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    
    <!-- Open Graph tags -->
    <meta property="og:title" content="StocksShorts - Real-time Indian Stock Market News & AI Analysis" />
    <meta property="og:description" content="Get instant Indian stock market updates, AI-powered stock analysis, live Nifty/Sensex tracking, IPO insights, and connect with SEBI registered investment advisors. Free mobile app with daily market alerts." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stocksshorts.com" />
    <meta property="og:site_name" content="StocksShorts" />
    <meta property="og:locale" content="en_IN" />
    
    <!-- Twitter Card tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StocksShorts - Indian Stock Market News & AI Analysis" />
    <meta name="twitter:description" content="Real-time Indian stock market news, AI stock analysis, and SEBI RIA connections. Track Nifty, Sensex, IPOs with instant mobile alerts." />
    
    <!-- Structured Data for Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "StocksShorts",
      "description": "Real-time Indian stock market news and AI-powered stock analysis platform",
      "url": "https://stocksshorts.com",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "featureList": [
        "Real-time Indian stock market news",
        "AI-powered stock analysis",
        "Live Nifty 50 and Sensex tracking",
        "IPO analysis and updates",
        "SEBI RIA advisor connections",
        "Breakout stock alerts",
        "Mobile app with push notifications"
      ]
    }
    </script>
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='white'/><text x='50' y='55' font-family='Arial,sans-serif' font-size='20' font-weight='bold' text-anchor='middle' fill='black'>SS</text></svg>" />
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#1E40AF" />
    
    <!-- Apple Web App meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="StocksShorts" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
